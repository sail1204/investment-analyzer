<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accuracy Tracker — Investment Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-2.26.0.min.js" charset="utf-8"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f8fafc; margin:0; }
    nav a { padding:4px 12px; border-radius:6px; font-size:0.875rem; font-weight:500; color:rgba(255,255,255,0.8); text-decoration:none; transition:background 0.15s; }
    nav a:hover, nav a.active { background:rgba(255,255,255,0.2); color:#fff; }
    .card { background:white; border-radius:16px; border:1px solid #e2e8f0; box-shadow:0 1px 6px rgba(0,0,0,0.04); padding:24px; }
    .stat-card { background:white; border-radius:12px; border:1px solid #e2e8f0; box-shadow:0 1px 4px rgba(0,0,0,0.04); padding:20px 24px; text-align:center; }
    .section-title { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#94a3b8; margin-bottom:12px; }
  </style>
</head>
<body>

  <header style="background:linear-gradient(135deg,#4f46e5,#6366f1);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(79,70,229,0.3);position:sticky;top:0;z-index:50;">
    <span style="font-size:1.1rem;font-weight:700;color:white;letter-spacing:-0.02em;">📈 Investment Analyzer</span>
    <div style="flex:1"></div>
    <nav style="display:flex;gap:4px;">
      <a href="/">Summary</a>
      <a href="/portfolio">Portfolio</a>
      <a href="/corrections">Corrections</a>
      <a href="/accuracy" class="active">Accuracy</a>
      <a href="/learning">Learning</a>
      <a href="/about">About</a>
      <a href="/changes">Changes</a>
    </nav>
  </header>

  <div style="padding:28px 32px;max-width:1400px;margin:0 auto;">
    <div style="margin-bottom:24px;">
      <h1 style="font-size:1.5rem;font-weight:700;color:#0f172a;margin:0 0 4px 0;">Accuracy Tracker</h1>
      <p style="font-size:0.875rem;color:#94a3b8;margin:0;">Evaluates thesis drift signals over time. Builds up after multiple weekly runs.</p>
    </div>

    <div id="content">
      <p style="color:#94a3b8;text-align:center;margin-top:80px;">Loading…</p>
    </div>
  </div>

  <script>
    fetch('/api/corrections')
      .then(r => r.json())
      .then(rows => {
        const el = document.getElementById('content');
        if (!rows.length) {
          el.innerHTML = `<div class="card" style="text-align:center;padding:60px;">
            <div style="font-size:2rem;margin-bottom:12px;">📊</div>
            <div style="font-size:1rem;color:#64748b;font-weight:500;">No correction data yet</div>
            <div style="font-size:0.875rem;color:#94a3b8;margin-top:6px;">Run the weekly agent for at least 2 consecutive weeks to generate corrections.</div>
          </div>`;
          return;
        }

        // Compute stats
        const total       = rows.length;
        const stable      = rows.filter(r => r.drift_signal === 'Stable').length;
        const updated     = rows.filter(r => r.drift_signal === 'Updated').length;
        const contradicted= rows.filter(r => r.drift_signal === 'Contradicted').length;
        const errTypes    = {};
        rows.filter(r=>r.error_type).forEach(r=>{ errTypes[r.error_type]=(errTypes[r.error_type]||0)+1; });

        // Drift over time
        const byWeek = {};
        rows.forEach(r => {
          if (!byWeek[r.run_date]) byWeek[r.run_date]={Stable:0,Updated:0,Contradicted:0};
          byWeek[r.run_date][r.drift_signal] = (byWeek[r.run_date][r.drift_signal]||0)+1;
        });
        const weeks = Object.keys(byWeek).sort();

        el.innerHTML = `
          <!-- Summary stat cards -->
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
            <div class="stat-card">
              <div style="font-size:2rem;font-weight:800;color:#0f172a;">${total}</div>
              <div style="font-size:0.8rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-top:4px;">Total Corrections</div>
            </div>
            <div class="stat-card">
              <div style="font-size:2rem;font-weight:800;color:#15803d;">${stable}</div>
              <div style="font-size:0.8rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-top:4px;">Stable</div>
            </div>
            <div class="stat-card">
              <div style="font-size:2rem;font-weight:800;color:#b45309;">${updated}</div>
              <div style="font-size:0.8rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-top:4px;">Updated</div>
            </div>
            <div class="stat-card">
              <div style="font-size:2rem;font-weight:800;color:#b91c1c;">${contradicted}</div>
              <div style="font-size:0.8rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-top:4px;">Contradicted</div>
            </div>
          </div>

          <!-- Charts row -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
            <div class="card">
              <div class="section-title">Drift Distribution</div>
              <div id="chart-drift" style="height:260px;"></div>
            </div>
            <div class="card">
              <div class="section-title">Error Types (Contradicted Only)</div>
              <div id="chart-err" style="height:260px;display:flex;align-items:center;justify-content:center;">
                ${contradicted === 0 ? '<span style="color:#cbd5e1;font-size:0.875rem;">No contradicted theses yet.</span>' : ''}
              </div>
            </div>
          </div>

          <!-- Drift over time stacked bar -->
          ${weeks.length > 1 ? `
          <div class="card" style="margin-bottom:24px;">
            <div class="section-title">Drift Signals by Week</div>
            <div id="chart-weekly" style="height:260px;"></div>
          </div>` : ''}

          <!-- Corrections table -->
          <div class="card">
            <div class="section-title">All Correction Events</div>
            <div style="overflow-x:auto;">
              <table style="width:100%;border-collapse:collapse;font-size:0.85rem;">
                <thead>
                  <tr style="border-bottom:2px solid #e2e8f0;">
                    <th style="padding:10px 12px;text-align:left;color:#64748b;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;">Week</th>
                    <th style="padding:10px 12px;text-align:left;color:#64748b;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;">Ticker</th>
                    <th style="padding:10px 12px;text-align:left;color:#64748b;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;">Drift</th>
                    <th style="padding:10px 12px;text-align:left;color:#64748b;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;">Error Type</th>
                    <th style="padding:10px 12px;text-align:left;color:#64748b;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;min-width:280px;">Explanation</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.map(r => {
                    const DRIFT_STYLE = {Stable:'background:#dcfce7;color:#15803d',Updated:'background:#fef3c7;color:#b45309',Contradicted:'background:#fee2e2;color:#b91c1c',New:'background:#e0f2fe;color:#0369a1'};
                    const ds = DRIFT_STYLE[r.drift_signal]||'background:#f1f5f9;color:#475569';
                    const esc = s => String(s||'—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    return `<tr style="border-bottom:1px solid #f1f5f9;">
                      <td style="padding:10px 12px;color:#64748b;white-space:nowrap;">${esc(r.run_date)}</td>
                      <td style="padding:10px 12px;"><a href="/stock/${esc(r.ticker)}" style="font-weight:700;color:#4f46e5;text-decoration:none;">${esc(r.ticker)}</a></td>
                      <td style="padding:10px 12px;"><span style="display:inline-block;padding:2px 10px;border-radius:999px;font-size:0.72rem;font-weight:700;${ds}">${esc(r.drift_signal)}</span></td>
                      <td style="padding:10px 12px;color:#64748b;white-space:nowrap;">${esc(r.error_type)}</td>
                      <td style="padding:10px 12px;color:#475569;line-height:1.5;">${esc(r.agents_explanation)}</td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;

        // Drift pie
        Plotly.newPlot('chart-drift', [{
          type:'pie', hole:0.5,
          labels:['Stable','Updated','Contradicted'],
          values:[stable, updated, contradicted],
          marker:{ colors:['#22c55e','#f59e0b','#ef4444'] },
          textinfo:'label+percent', hoverinfo:'label+value',
        }], { margin:{t:8,b:8,l:8,r:8}, showlegend:false, paper_bgcolor:'white' }, { displayModeBar:false, responsive:true });

        // Error type pie
        if (contradicted > 0) {
          Plotly.newPlot('chart-err', [{
            type:'pie', hole:0.5,
            labels: Object.keys(errTypes),
            values: Object.values(errTypes),
            marker:{ colors:['#818cf8','#fb923c','#f87171','#34d399'] },
            textinfo:'label+percent',
          }], { margin:{t:8,b:8,l:8,r:8}, showlegend:false, paper_bgcolor:'white' }, { displayModeBar:false, responsive:true });
        }

        // Weekly stacked bar
        if (weeks.length > 1) {
          const traces = ['Stable','Updated','Contradicted'].map((sig, i) => ({
            name:sig, type:'bar', x:weeks,
            y:weeks.map(w => byWeek[w][sig]||0),
            marker:{ color:['#22c55e','#f59e0b','#ef4444'][i] },
          }));
          Plotly.newPlot('chart-weekly', traces, {
            barmode:'stack', margin:{t:8,b:40,l:40,r:8},
            xaxis:{ tickfont:{size:11,color:'#94a3b8'} },
            yaxis:{ tickfont:{size:11,color:'#94a3b8'}, dtick:1 },
            plot_bgcolor:'white', paper_bgcolor:'white',
            legend:{ orientation:'h', y:-0.2 },
          }, { displayModeBar:false, responsive:true });
        }
      });
  </script>
</body>
</html>
